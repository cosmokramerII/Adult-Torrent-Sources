name: RARBG Dump (Historical + NSFW Focus)
author: Intelligence (personal use only)
sources:
  - name: RARBG Dump
    version: 2
    minVersion: '0.7'
    about: >-
      Full RARBG database dump with millions of historical torrents. Excellent for older/legacy lesbian, Scoreland, big-tit, and girl-girl packs that are hard to find elsewhere. Fast magnets + accurate sizes.
    website: "https://rarbgdump.com"
    tags:
      - name: Reliable
        color: 34c759
      - name: Lesbian
        color: ff2d55
      - name: Scoreland
        color: ffcc00
      - name: Adult
        color: ff2d55
      - name: Historical
        color: 5856d6
    htmlParser:
      searchUrl: /search/{query}          # Works exactly like your example URL
      rows: 'tbody tr'                    # Precise for RARBG dump table rows
      magnet:
        query: 'a[href^="magnet:"]'
        attribute: href
      title:
        query: 'td:nth-child(2) a'        # Main title link (column 2)
      size:
        query: 'td:nth-child(4)'          # Size column
        regex: '(\d+(\.\d+)?\s?[KMGT]B)'
      sl:
        seeders: 'td:nth-child(5)'        # Seeds column
        leechers: 'td:nth-child(6)'       # Leechers column
      # Optional but useful: date for sorting older packs
      date:
        query: 'td:nth-child(3)'